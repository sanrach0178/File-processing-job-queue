version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: job-queue-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: jobqueue
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: job-queue-redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres-data:

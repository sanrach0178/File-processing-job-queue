version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: job-queue-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: jobqueue
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: job-queue-redis
    ports:
      - "6379:6379"
    restart: always

  app:
    build: .
    container_name: job-queue-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/jobqueue
      - SPRING_DATASOURCE_USERNAME=myuser
      - SPRING_DATASOURCE_PASSWORD=mypassword
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    depends_on:
      - postgres
      - redis
    restart: on-failure

volumes:
  postgres-data:
